<form>

<fieldset>

<legend>Dados Pessoais</legend>

<label>Nome:</label>
<input type="text" required>

<br><br>

<label>Email:</label>
<input type="email" required>

<br><br>

<label>Código de Acesso:</label>
<input type="password">

<br><br>

<label>Cidade de Origem:</label>
<input list="cidades">

<datalist id="cidades">
<option value="Gramado">
<option value="Rio de Janeiro">
<option value="Maragogi">
<option value="São Paulo">
</datalist>

</fieldset>

<br>

<fieldset>

<legend>Palpites</legend>

<label>Data que assistiu ao filme:</label>
<input type="date">

<br><br>

<label>Categoria:</label>

<select>
<option>Melhor Filme</option>
<option>Melhor Ator</option>
<option>Melhor Atriz</option>
<option>Melhor Direção</option>
</select>

<p>Ator favorito:</p>

<input type="radio" name="ator"> Wagner Moura
<input type="radio" name="ator"> Cillian Murphy

<p>Nível de confiança na vitória do Brasil:</p>

<input type="range" min="0" max="10">

<p>Justificativa:</p>

<textarea rows="4" cols="40"></textarea>

</fieldset>

<br>

<button type="submit">Enviar Palpite</button>

</form>
